name: Build the CGV framework

on: push

jobs:
  build:
    name: "${{ matrix.os }} (${{ matrix.compiler }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            install_deps: "sudo apt-get update && sudo apt-get install -y libglx-dev libglew-dev libxft-dev libxinerama-dev libxi-dev"
          - os: ubuntu-latest
            compiler: clang
            install_deps: "sudo apt-get update && sudo apt-get install -y clang libglx-dev libglew-dev libxft-dev libxinerama-dev libxi-dev"
          - os: windows-latest
            compiler: msvc
            install_deps: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install build tools
        uses: lukka/get-cmake@latest

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with:
          key: ${{ github.job }}-${{ matrix.os }}
          verbose: 1

      - name: Setup VS Environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        if: matrix.install_deps != ''
        run: ${{ matrix.install_deps }}

      - name: Configure with CMake
        run: >-
          cmake --preset=ci-${{ matrix.os }}-${{ matrix.compiler }}

      - name: Build
        run: cmake --build build
