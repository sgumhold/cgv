name: Build and Install the CGV framework

on: push

jobs:
  build-ubuntu:
    name: "Ubuntu: Build and Install the CGV framework"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            libglx-dev \
            libglew-dev \
            libxft-dev \
            libxinerama-dev \
            libxi-dev

      - name: Configure with CMake
        run: cmake -B build -G Ninja -D CMAKE_INSTALL_PREFIX=../install

      - name: Build
        run: cmake --build build

  build-windows:
    name: "Windows: Build and Install the CGV framework"
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master
      - name: Setup VS Environment
        uses: seanmiddleditch/gha-setup-vsdevenv@master

      - run: mkdir build

      - name: Run CMake
        working-directory: build
        run: cmake .. -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_INSTALL_PREFIX=../install -D CMAKE_CXX_COMPILER=cl -D CMAKE_C_COMPILER=cl

      - name: Build and Install
        working-directory: ./build
        run: cmake --build . --target install
